{{define "new_project"}}{{template "head" .}}
<section class="form-narrow">
  <h1>{{.T "new.h1"}}</h1>
  <p class="muted">{{.T "new.intro"}}</p>
  <form method="post" action="/projects" class="stack">
    <input type="hidden" name="csrf_token" value="{{.CSRF}}">
    <label>{{.T "new.name_label"}} <span class="hint">{{.T "new.name_hint"}}</span>
      <input type="text" name="name" placeholder="{{.T "new.name_ph"}}">
    </label>
    <label>{{.T "new.brief_label"}}
      <textarea name="brief" rows="7" required
        placeholder="{{.T "new.brief_ph"}}"></textarea>
    </label>
    {{if .IsAdmin}}
    <div class="model-experiment">
      <p class="muted small">Models <span class="hint">admin · used for this build</span></p>
      <div class="model-picker">
        <label>Planner
          <select name="planner_profile">
            {{range $.Data.Profiles}}<option value="{{.Key}}"{{if eq .Key $.Data.PlannerProfile}} selected{{end}}>{{.Label}}{{if .Effort}} · {{.Effort}}{{end}}</option>{{end}}
          </select>
        </label>
        <label>Implementation
          <select name="impl_profile">
            {{range $.Data.Profiles}}<option value="{{.Key}}"{{if eq .Key $.Data.ImplProfile}} selected{{end}}>{{.Label}}{{if .Effort}} · {{.Effort}}{{end}}</option>{{end}}
          </select>
        </label>
      </div>
    </div>
    {{end}}
    <button class="btn" type="submit">{{.T "new.submit"}}</button>
  </form>
</section>
{{template "foot" .}}{{end}}
