{{/* Standalone page for preview hosts with nothing to serve (unknown label,
     expired preview, backend down). Fully self-contained: on a preview host,
     /static/* would be proxied to the backend, so no external assets. */}}
{{define "preview_gone"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<meta name="robots" content="noindex">
<title>{{.Title}}</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: #14130d; color: #e8e6dd;
         font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  main { max-width: 26rem; padding: 2rem; text-align: center; }
  h1 { font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
       font-size: 1.2rem; font-weight: 600; color: #e0a93c; margin: 0 0 .75rem; }
  p { margin: 0; font-size: .9375rem; line-height: 1.6; color: #938f7c; }
</style>
</head>
<body>
<main>
  <h1>{{.Title}}</h1>
  <p>{{.Body}}</p>
</main>
</body>
</html>{{end}}
