{{define "login"}}{{template "head" .}}
<section class="form-narrow auth-page">
  <h1>{{.T "login.h1"}}</h1>

  {{if .Providers}}
  <div class="oauth-buttons">
    {{range .Providers}}
    <a class="btn btn-ghost btn-oauth" href="/auth/{{.Name}}">{{$.T "auth.continue_with"}} {{.Label}}</a>
    {{end}}
  </div>
  <div class="or-divider"><span>{{.T "auth.or"}}</span></div>
  {{end}}

  <form method="post" action="/auth/magic" class="stack">
    <label>{{.T "login.magic_label"}}<input type="email" name="email" required autofocus placeholder="you@example.com" autocomplete="email" spellcheck="false"></label>
    <button class="btn" type="submit">{{.T "login.magic_btn"}}</button>
  </form>

  <p class="muted">{{.T "login.no_account"}} <a href="/signup">{{.T "login.get_started"}}</a>.</p>
</section>
{{template "foot" .}}{{end}}
