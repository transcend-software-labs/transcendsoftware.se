# Deploy config. The app name is supplied by the deploy command (--app), so
# this file works unchanged for every project.
#
# Deploy with:  fly deploy --remote-only --ha=false --app "$FLY_APP" ...
# --ha=false is required: SQLite lives on ONE machine; a second machine would
# be a second, diverging database.
#
# Data note: without a volume, $DATA_DIR (/data) lives on the machine's root
# filesystem — it survives stop/start but resets on redeploys. At go-live,
# create a volume (fly volumes create data --region arn -s 1) and add:
#   [mounts]
#     source = "data"
#     destination = "/data"

primary_region = "arn"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

[env]
  SECURE_COOKIE = "true"
