# Deploy config. The app name is supplied by the deploy command (--app), so
# this file works unchanged for every project.
#
# Deploy with:  fly deploy --remote-only --ha=false --app "$FLY_APP" ...
# --ha=false is required: SQLite lives on ONE machine; a second machine would
# be a second, diverging database.

primary_region = "arn"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

# Durable storage for the SQLite database. initial_size provisions the volume
# automatically on the first `fly deploy` (no manual `fly volumes create`), and
# it persists across redeploys — the machine mounts it at $DATA_DIR (/data).
# One volume + --ha=false = one machine, one database.
[mounts]
  source = "data"
  destination = "/data"
  initial_size = "1gb"

[env]
  SECURE_COOKIE = "true"
