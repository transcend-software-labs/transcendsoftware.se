{{define "login"}}{{template "head" .}}
<section class="section">
  <div class="container narrow">
    <div class="panel">
      <h1>Owner login</h1>
      <form method="post" action="/login" class="stack">
        <label><span class="field-label">Email <span class="required-mark" aria-hidden="true">*</span></span><input type="email" name="email" required autocomplete="email" spellcheck="false"></label>
        <label><span class="field-label">Password <span class="required-mark" aria-hidden="true">*</span></span><input type="password" name="password" required autocomplete="current-password"></label>
        <button class="btn" type="submit">Log in</button>
      </form>
      <p class="muted small">No owner account yet? <a href="/signup">Create it</a>.</p>
    </div>
  </div>
</section>
{{template "foot" .}}{{end}}
