{{define "landing"}}{{template "head" .}}
<section class="hero section">
  <div class="container">
    <h1>Welcome</h1>
    <p class="lead">This is the starting point for your new site. Replace this page with your real content.</p>
  </div>
</section>

<section class="section section-tint" id="contact">
  <div class="container container-copy">
    <div class="panel">
      <h2>Contact us</h2>
      <form method="post" action="/contact" class="stack">
        <label><span class="field-label">Name <span class="required-mark" aria-hidden="true">*</span></span><input type="text" name="name" required maxlength="200" autocomplete="name"></label>
        <label>Email <input type="email" name="email" maxlength="200" autocomplete="email" spellcheck="false"></label>
        <label><span class="field-label">Message <span class="required-mark" aria-hidden="true">*</span></span><textarea name="message" rows="5" required maxlength="4000"></textarea></label>
        <button class="btn" type="submit">Send</button>
      </form>
    </div>
  </div>
</section>
{{template "foot" .}}{{end}}
