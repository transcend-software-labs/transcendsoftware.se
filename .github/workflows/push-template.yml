# Push the starter-app template tarball to object storage when it changes.
#
# The template (product/template/goapp) seeds every fresh build's workspace via
# the TEMPLATE_KEY tarball (templates/goapp.tgz). Editing it — the AGENTS.md
# design/build guidance, the starter UI, migrations — only reaches NEW builds
# after `make template-push` re-uploads it. This runs that automatically on any
# template change, so it's never a forgotten manual step. (The sandbox image is
# still rebuilt manually with `make sandbox-build` — see sandbox/README.md.)
#
# Auth: the orchestrator's Tigris/S3 credentials, added to the repo and MATCHing
# the Fly secrets on transcend-forge so the tarball lands in the bucket the
# orchestrator reads TEMPLATE_KEY from. Only the Secret Access Key is sensitive:
#   repo Secret:    STORAGE_SECRET_KEY
#   repo Variables: STORAGE_ENDPOINT, STORAGE_ACCESS_KEY (the key ID),
#                   STORAGE_BUCKET (= transcend-forge-assets), STORAGE_REGION
#                   (= auto), STORAGE_USE_SSL (= true).
# The sandbox never gets these.
name: Push template

on:
  push:
    branches: [main]
    paths:
      - 'product/template/**'
  workflow_dispatch: {} # manual "push template now" from the Actions tab

# One push at a time; the tarball is last-write-wins, so don't race.
concurrency:
  group: push-template
  cancel-in-progress: false

jobs:
  push:
    name: Upload template tarball
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: product
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: product/go.mod
          cache-dependency-path: product/go.sum

      - name: Push template to object storage
        run: make template-push
        env:
          # Only the Secret Access Key is sensitive → a repo Secret. Everything
          # else (endpoint, bucket, region, TLS, and the Access Key ID, which is
          # just an identifier) is a repo Variable.
          STORAGE_SECRET_KEY: ${{ secrets.STORAGE_SECRET_KEY }}
          STORAGE_ENDPOINT: ${{ vars.STORAGE_ENDPOINT }}
          STORAGE_ACCESS_KEY: ${{ vars.STORAGE_ACCESS_KEY }}
          STORAGE_BUCKET: ${{ vars.STORAGE_BUCKET }}
          STORAGE_REGION: ${{ vars.STORAGE_REGION }}
          STORAGE_USE_SSL: ${{ vars.STORAGE_USE_SSL }}
